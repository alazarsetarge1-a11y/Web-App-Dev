<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us</title>
  <style>
    form {
      background-color: #EAEAEA;
      font-family: Arial, sans-serif;
      width: 350px;
      padding: 10px;
    }

    label {
      float: left;
      clear: left;
      display: block;
      width: 100px;
      padding-right: 10px;
      margin-top: 10px;
      text-align: right;
    }

    input {
      display: block;
      margin-top: 10px;
    }

    textarea {
      display: block;
      margin-top: 10px;
    }

    #submitBtn {
      margin-left: 110px;
    }

    #thankyouBtn{
        margin-left: 110px;
    }

    /* ── Feature Query: Grid Layout Support ── */
    @supports (display: grid) {

      form {
        display: grid;
        grid-template-rows: auto;
        grid-template-columns: 6em 1fr;
        gap: 1em;
        background-color: #EAEAEA;
        font-family: Arial, sans-serif;
        width: 60%;
        min-width: 20em;
        padding: 1.5em;
      }

      /* Reset float-based styles no longer needed in grid */
      label {
        float: none;
        clear: none;
        width: auto;
        padding-right: 0;
        margin-top: 0;
        text-align: right;
        align-self: center;
      }

      input {
        display: block;
        margin-top: 0;
      }

      textarea {
        display: block;
        margin-top: 0;
      }

    
      #submitBtn {
        grid-column: 2;
        margin-left: 0;
      }
      #thankyouBtn{
        grid-column: 3;
        margin-left: 0;
      }

    }
  </style>
</head>
<body>
  <h1>Contact Us</h1>
  <form>
    <label for="myName">Name:</label>
    <input type="text" name="myName" id="myName">

    <label for="myEmail">E-mail:</label>
    <input type="text" name="myEmail" id="myEmail">

    <label for="myComments">Comments:</label>
    <textarea name="myComments" id="myComments" rows="2" cols="20"></textarea>

    <input type="submit" value="Submit" id="submitBtn">
    <input type="submit" value="Submit" id="thankyouBtn">
  </form>
</body>
</html>
