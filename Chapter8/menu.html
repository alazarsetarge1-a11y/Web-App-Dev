<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Menu Table</title>
  <style>
    table {
      margin: auto;
      border: 5px solid #000066;
      width: 600px;
      border-collapse: collapse;
    }

    td, th {
      border: 1px solid #000066;
      padding: 0.5em;
      font-family: Arial, sans-serif;
    }

    th {
      background-color: #000066;
      color: #ffffff;
    }
  </style>
</head>
<body>

  <table>
    <tr>
      <th>Item</th>
      <th style="text-align: center;">Price</th>
      <th>Description</th>
    </tr>
    <tr>
      <td>Soup of the Day</td>
      <td>$4.99</td>
      <td>Ask your server for today's selection</td>
    </tr>
    <tr>
      <td>Garden Salad</td>
      <td>$5.99</td>
      <td>Mixed greens with house dressing</td>
    </tr>
    <tr>
      <td>Grilled Salmon</td>
      <td>$18.99</td>
      <td>Served with seasonal vegetables</td>
    </tr>
  </table>

</body>
</html>
